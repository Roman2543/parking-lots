services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: parking-lots-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: parking-lots-mssql-init
    depends_on:
      mssql:
        condition: service_started
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      APP_DB_USER: "app_user"
      APP_DB_PASSWORD: "AppUser!Passw0rd"
      APP_DB_NAME: "parking_lots"
    volumes:
      - ./docker/mssql/init.sql:/scripts/init.sql:ro
    command:
      - /bin/bash
      - -lc
      - |
        until /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
          echo "Waiting for SQL Server..."
          sleep 2
        done
        perl -pe 's/\$\((APP_DB_USER|APP_DB_PASSWORD|APP_DB_NAME)\)/$$ENV{$$1}/ge' /scripts/init.sql > /tmp/init.sql
        /opt/mssql-tools/bin/sqlcmd \
          -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" \
          -i /tmp/init.sql
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parking-lots-app
    depends_on:
      mssql:
        condition: service_started
      mssql-init:
        condition: service_completed_successfully
    environment:
      PORT: "3000"
      DB_HOST: "mssql"
      DB_PORT: "1433"
      DB_USER: "app_user"
      DB_PASSWORD: "AppUser!Passw0rd"
      DB_NAME: "parking_lots"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mssql-data:
